<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Schools | Learn Claude & Perplexity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="tutorial-layout">
    <button class="mobile-toggle" id="mobile-toggle"><i class="ph ph-list"></i></button>

    <nav id="sidebar">
        <div class="logo">
            <i class="ph-fill ph-graduation-cap"></i>
            <span>AI Schools</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
            </div>
            <span id="progress-text">0% Complete</span>
        </div>

        <div id="nav-content">
            <!-- Curriculum will be injected here -->
        </div>
    </nav>

    <main id="content-area">
        <div class="tutorial-header">
            <div class="breadcrumb" id="breadcrumb">Course / Lesson</div>
            <div class="nav-controls-top">
                <button class="btn-nav prev" onclick="navigatePage(-1)"><i class="ph ph-caret-left"></i> Previous</button>
                <button class="btn-nav next" onclick="navigatePage(1)">Next <i class="ph ph-caret-right"></i></button>
            </div>
        </div>
        
        <article id="markdown-viewer">
            <div class="loading">
                <i class="ph ph-circle-notch ph-spin"></i>
                <span>Loading Tutorial...</span>
            </div>
        </article>

        <div class="nav-controls-bottom">
            <button class="btn-nav prev" onclick="navigatePage(-1)"><i class="ph ph-caret-left"></i> Previous Lesson</button>
            <button class="btn-nav next" onclick="navigatePage(1)">Next Lesson <i class="ph ph-caret-right"></i></button>
        </div>

        <footer class="content-footer">
            <p>&copy; 2026 AI Schools. Learn the future of Claude and Perplexity.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
